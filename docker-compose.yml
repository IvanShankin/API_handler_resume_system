
services:
  # ---------- Infrastructure ----------

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456789
      POSTGRES_DB: resume_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - backend

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - backend

  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "29092:29092"  # брокерский порт
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "29092" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  # ---------- Microservices ----------

  auth:
    image: vanomdoc/api_handler_resume_auth_service:1.0.0
    env_file:
      - .env
    environment:
      - DB_NAME=api_handler_resume_auth_service
    ports:
      - "7001:8000"
    depends_on:
      - postgres
      - redis
      - kafka
    restart: unless-stopped
    networks:
      - backend

  upload:
    image: vanomdoc/api_handler_resume_upload_service:1.0.0
    environment:
      - DB_NAME=api_handler_resume_upload_service
    env_file:
      - .env
    ports:
      - "7002:8000"
    depends_on:
      - postgres
      - redis
      - kafka
    restart: unless-stopped
    networks:
      - backend

  storage:
    image: vanomdoc/api_handler_resume_storage_service:1.0.0
    environment:
      - DB_NAME=api_handler_resume_storage_service
    env_file:
      - .env
    ports:
      - "7003:8000"
    depends_on:
      - postgres
      - redis
      - kafka
    restart: unless-stopped
    networks:
      - backend

  ai_handler:
    image: vanomdoc/api_handler_resume_ai_handler_service:1.0.0
    env_file:
      - .env
    depends_on:
      - redis
      - kafka
    restart: unless-stopped
    networks:
      - backend

  # nginx
  gateway:
    image: nginx:1.25
    ports:
      - "1297:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth
      - upload
      - storage
      - ai_handler
    networks:
      - backend

networks:
  backend:
    driver: bridge



volumes:
  postgres_data:
  kafka_data:
